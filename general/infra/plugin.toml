# Infralyzer: containers and orchestration (Dockerfile, Containerfile, compose, K8s/OpenShift).
# discover -> analyze -> report; state shared. Optional Trivy for image CVEs.
# Run ./install.sh once so the venv and plugin_wrapper.sh exist.
name = "infralyzer"
version = "0.1.0"
api_version = "1.x"
entry = "plugin_wrapper.sh"
capabilities = ["discover", "analyze", "report"]
reads_fs = true
needs_content = true
# Analyze can run several Trivy scans (each up to trivy_timeout_sec); allow 30 min total
timeout_ms = 1800000
# Trivy (subprocess) needs several GB for vuln DB (e.g. "Starlark 4GB address space"); 512 MB caused OOM
mem_mb = 4096
config_schema = "schema.json"

[install]
steps = [
  "chmod +x install.sh",
  "./install.sh"
]
